<svg width="1200" height="520" viewBox="0 0 1200 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CareSlot authentication flow</title>
  <desc id="desc">Diagram showing signup, login, Supabase auth, token storage, protected requests, and token verification.</desc>
  <rect width="1200" height="520" fill="#f8fafc"/>
  <text x="600" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#0f172a">Authentication Flow</text>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#0ea5e9"/>
    </marker>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <g font-family="Arial, sans-serif" filter="url(#shadow)">
    <rect x="70" y="150" width="210" height="130" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="175" y="190" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">User</text>
    <text x="105" y="226" font-size="15" fill="#334155">Enters email and password</text>
    <text x="105" y="250" font-size="15" fill="#334155">on the auth screen</text>

    <rect x="370" y="150" width="210" height="130" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="475" y="190" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Frontend</text>
    <text x="405" y="226" font-size="15" fill="#334155">Calls /api/auth/login</text>
    <text x="405" y="250" font-size="15" fill="#334155">and stores tokens</text>

    <rect x="670" y="150" width="210" height="130" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="775" y="190" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Backend</text>
    <text x="705" y="226" font-size="15" fill="#334155">AuthService calls</text>
    <text x="705" y="250" font-size="15" fill="#334155">Supabase Auth</text>

    <rect x="970" y="150" width="170" height="130" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="1055" y="190" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Supabase</text>
    <text x="1000" y="226" font-size="15" fill="#334155">Returns user,</text>
    <text x="1000" y="250" font-size="15" fill="#334155">access token</text>
  </g>

  <line x1="280" y1="215" x2="357" y2="215" stroke="#0ea5e9" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="580" y1="215" x2="657" y2="215" stroke="#0ea5e9" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="880" y1="215" x2="957" y2="215" stroke="#0ea5e9" stroke-width="4" marker-end="url(#arrow)"/>

  <path d="M1055 280 C1055 365 475 365 475 292" fill="none" stroke="#0ea5e9" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="760" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#0369a1">Token response is stored as careslot_auth</text>

  <rect x="255" y="420" width="690" height="48" rx="14" fill="#ecfeff" stroke="#a5f3fc"/>
  <text x="600" y="451" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#155e75">Protected API calls include Authorization: Bearer &lt;access_token&gt;. The backend verifies the token before returning private data.</text>
</svg>
