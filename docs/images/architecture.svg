<svg width="1200" height="620" viewBox="0 0 1200 620" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CareSlot system architecture</title>
  <desc id="desc">Diagram showing the React frontend, FastAPI backend, Supabase, AI services, external integrations, and notification providers.</desc>
  <rect width="1200" height="620" fill="#f7fafc"/>
  <text x="600" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#0f172a">CareSlot Architecture</text>
  <text x="600" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#475569">Patient dashboard, AI health guidance, booking, reminders, and external integrations</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="60" y="160" width="245" height="250" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="182" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#0f172a">React Frontend</text>
    <text x="92" y="242" font-family="Arial, sans-serif" font-size="15" fill="#334155">- Login and signup</text>
    <text x="92" y="272" font-family="Arial, sans-serif" font-size="15" fill="#334155">- Dashboard overview</text>
    <text x="92" y="302" font-family="Arial, sans-serif" font-size="15" fill="#334155">- Detection workflows</text>
    <text x="92" y="332" font-family="Arial, sans-serif" font-size="15" fill="#334155">- Appointment booking</text>
    <text x="92" y="362" font-family="Arial, sans-serif" font-size="15" fill="#334155">- Notifications</text>
    <rect x="92" y="382" width="181" height="34" rx="17" fill="#dbeafe"/>
    <text x="182" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#1d4ed8">Vite + React</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="475" y="130" width="250" height="310" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="600" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#0f172a">FastAPI Backend</text>
    <text x="507" y="212" font-family="Arial, sans-serif" font-size="15" fill="#334155">- Auth router</text>
    <text x="507" y="242" font-family="Arial, sans-serif" font-size="15" fill="#334155">- Chat and RAG</text>
    <text x="507" y="272" font-family="Arial, sans-serif" font-size="15" fill="#334155">- Skin model service</text>
    <text x="507" y="302" font-family="Arial, sans-serif" font-size="15" fill="#334155">- PCOD assessment</text>
    <text x="507" y="332" font-family="Arial, sans-serif" font-size="15" fill="#334155">- Appointments</text>
    <text x="507" y="362" font-family="Arial, sans-serif" font-size="15" fill="#334155">- Reminders</text>
    <rect x="515" y="386" width="170" height="34" rx="17" fill="#dcfce7"/>
    <text x="600" y="409" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#166534">Python API Layer</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="900" y="110" width="230" height="115" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="1015" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#0f172a">Supabase</text>
    <text x="934" y="185" font-family="Arial, sans-serif" font-size="15" fill="#334155">Auth, database, profiles,</text>
    <text x="934" y="209" font-family="Arial, sans-serif" font-size="15" fill="#334155">appointments, reminders</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="900" y="255" width="230" height="115" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="1015" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#0f172a">AI + Search</text>
    <text x="934" y="330" font-family="Arial, sans-serif" font-size="15" fill="#334155">Ollama, ChromaDB,</text>
    <text x="934" y="354" font-family="Arial, sans-serif" font-size="15" fill="#334155">HAM10000 skin model</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="900" y="400" width="230" height="115" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="1015" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#0f172a">Integrations</text>
    <text x="934" y="475" font-family="Arial, sans-serif" font-size="15" fill="#334155">Google Maps, hospital APIs,</text>
    <text x="934" y="499" font-family="Arial, sans-serif" font-size="15" fill="#334155">Resend, Twilio</text>
  </g>

  <line x1="305" y1="285" x2="462" y2="285" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="383" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#1d4ed8">REST API</text>
  <line x1="725" y1="210" x2="887" y2="170" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="725" y1="285" x2="887" y2="312" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="725" y1="360" x2="887" y2="457" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="318" y="500" width="564" height="62" rx="16" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="600" y="526" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1e3a8a">Important booking note</text>
  <text x="600" y="550" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1e40af">Appointments reach a real hospital only when a direct hospital API is configured; otherwise they stay in CareSlot as pending confirmation.</text>
</svg>
