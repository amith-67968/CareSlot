<svg width="1200" height="620" viewBox="0 0 1200 620" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CareSlot appointment booking flow</title>
  <desc id="desc">Diagram showing the direct hospital API booking path and the internal fallback booking path.</desc>
  <rect width="1200" height="620" fill="#f8fafc"/>
  <text x="600" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#0f172a">Appointment Booking Flow</text>
  <defs>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#16a34a"/>
    </marker>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <g font-family="Arial, sans-serif" filter="url(#shadow)">
    <rect x="70" y="150" width="220" height="110" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="180" y="190" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Patient</text>
    <text x="105" y="225" font-size="15" fill="#334155">Chooses hospital, doctor,</text>
    <text x="105" y="248" font-size="15" fill="#334155">date, slot, and reason</text>

    <rect x="390" y="150" width="240" height="110" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="510" y="190" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">CareSlot API</text>
    <text x="425" y="225" font-size="15" fill="#334155">Builds patient and</text>
    <text x="425" y="248" font-size="15" fill="#334155">appointment payload</text>

    <rect x="760" y="120" width="250" height="95" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="885" y="158" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Direct API Found</text>
    <text x="800" y="190" font-size="15" fill="#334155">Hospital confirms booking</text>

    <rect x="760" y="290" width="250" height="95" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="885" y="328" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">No API Found</text>
    <text x="800" y="360" font-size="15" fill="#334155">Internal pending request</text>

    <rect x="465" y="455" width="270" height="95" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="600" y="493" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Supabase Records</text>
    <text x="500" y="525" font-size="15" fill="#334155">appointments, reminders,</text>
    <text x="500" y="548" font-size="15" fill="#334155">booking queue items</text>
  </g>

  <line x1="290" y1="205" x2="377" y2="205" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <line x1="630" y1="192" x2="747" y2="165" stroke="#16a34a" stroke-width="4" marker-end="url(#arrowGreen)"/>
  <line x1="630" y1="230" x2="747" y2="330" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <line x1="885" y1="215" x2="700" y2="444" stroke="#16a34a" stroke-width="4" marker-end="url(#arrowGreen)"/>
  <line x1="885" y1="385" x2="700" y2="455" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue)"/>

  <rect x="150" y="330" width="420" height="70" rx="14" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="360" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1e40af">Fallback is intentional</text>
  <text x="360" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1e3a8a">It lets the app collect booking requests even when a real hospital scheduling API is unavailable.</text>
</svg>
